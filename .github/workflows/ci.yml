name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Dependency Audit
        # CVE-2026-3219 (pip): upstream未修正のため一時除外。pipはpip-audit経由の間接依存で
        # アプリ実行時には未使用。修正版リリース後にこのignoreを外して再評価すること。
        run: uv run pip-audit --ignore-vuln CVE-2026-3219

      - name: Ruff – format check
        run: uv run ruff format --check .

      - name: Ruff – lint
        run: uv run ruff check .

      - name: Mypy – type check
        run: uv run mypy .

      - name: Vulture – dead code check
        run: uv run vulture .

      - name: Xenon – complexity check
        run: uv run xenon .

  test:
    name: Tests
    runs-on: windows-latest
    needs: lint   # テストはLint通過後に実行
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests
        run: uv run pytest
